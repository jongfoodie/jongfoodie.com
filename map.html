<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Map — Jong Foodie</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cream: #FAF7F2; --warm-white: #FFFDF9; --ink: #1A1208; --ink-soft: #3D2F1A;
    --muted: #8A7A66; --border: rgba(26,18,8,0.1); --accent: #D4521A;
    --accent-pale: #FBF3EF; --gold: #C8901A; --green: #2D5A3D;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--ink); font-size: 15px; }
  nav { position: sticky; top: 0; z-index: 1000; background: var(--warm-white); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; }
  .nav-logo { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; color: var(--ink); text-decoration: none; }
  .nav-logo span { color: var(--accent); }
  .nav-links { display: flex; align-items: center; gap: 2rem; list-style: none; }
  .nav-links a { text-decoration: none; color: var(--ink-soft); font-size: 13px; font-weight: 500; letter-spacing: 0.03em; text-transform: uppercase; }
  .nav-links a:hover, .nav-links a.active { color: var(--accent); }
  .page-hero { background: var(--ink); color: #fff; padding: 2rem; text-align: center; }
  .page-hero h1 { font-family: 'Playfair Display', serif; font-size: 2.5rem; margin-bottom: 0.25rem; }
  .page-hero p { color: rgba(255,255,255,0.6); font-size: 14px; }
  .map-layout { display: grid; grid-template-columns: 320px 1fr; height: calc(100vh - 140px); }
  .spots-panel { background: var(--warm-white); border-right: 1px solid var(--border); overflow-y: auto; }
  .spots-search { padding: 1rem; border-bottom: 1px solid var(--border); }
  .search-input { width: 100%; border: 1px solid var(--border); border-radius: 20px; padding: 8px 16px; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--ink); background: var(--cream); outline: none; }
  .spots-count { font-size: 11px; color: var(--muted); padding: 0.5rem 1rem; border-bottom: 1px solid var(--border); }
  .spots-list { padding: 0.5rem; }
  .spot-item { display: flex; align-items: flex-start; gap: 0.75rem; padding: 0.75rem; border-radius: 10px; cursor: pointer; transition: background 0.15s; border-bottom: 1px solid var(--border); }
  .spot-item:last-child { border-bottom: none; }
  .spot-item:hover, .spot-item.active { background: var(--accent-pale); }
  .spot-emoji { font-size: 22px; min-width: 28px; }
  .spot-info { flex: 1; }
  .spot-name { font-weight: 500; font-size: 13px; line-height: 1.3; }
  .spot-address { font-size: 11px; color: var(--muted); }
  .spot-hours { font-size: 10px; color: var(--green); font-weight: 500; }
  .spot-rating { font-size: 11px; color: var(--gold); font-weight: 500; }
  #map { height: 100%; width: 100%; }
  .loading-bar { position: absolute; top: 0; left: 0; right: 0; background: var(--accent); color: #fff; text-align: center; padding: 8px; font-size: 13px; z-index: 999; }
  @media (max-width: 700px) {
    .map-layout { grid-template-columns: 1fr; grid-template-rows: 300px 1fr; }
    nav { padding: 0 1rem; }
    .nav-links { display: none; }
  }
</style>
<script id="mcjs">!function(c,h,i,m,p){m=c.createElement(h),p=c.getElementsByTagName(h)[0],m.async=1,m.src=i,p.parentNode.insertBefore(m,p)}(document,"script","https://chimpstatic.com/mcjs-connected/js/users/0252a7809924477245601c5ff/d41b74b09ae03c3e97227b3ec.js");</script>
</head>
<body>
<nav>
  <a class="nav-logo" href="index.html">Jong <span>Foodie</span></a>
  <ul class="nav-links">
    <li><a href="reviews.html">Reviews</a></li>
    <li><a href="guides.html">Guides</a></li>
    <li><a href="map.html" class="active">Map</a></li>
    <li><a href="community.html">Community</a></li>
  </ul>
</nav>
<div class="page-hero">
  <h1>Food Map</h1>
  <p>All Jong Foodie reviewed spots in Amsterdam & beyond</p>
</div>
<div class="map-layout" style="position:relative;">
  <div id="loadingBar" class="loading-bar">📍 Loading restaurant locations...</div>
  <div class="spots-panel">
    <div class="spots-search">
      <input class="search-input" type="text" placeholder="Search spots…" oninput="filterSpots(this.value)">
    </div>
    <div class="spots-count" id="spotsCount">Loading...</div>
    <div class="spots-list" id="spotsList"></div>
  </div>
  <div id="map"></div>
</div>

<script>
const spots = [
  { name: 'The Coffee', address: 'Eerste Constantijn Huygensstraat 33, Amsterdam', hours: 'Mon–Thu 08:00–17:00 · Fri 08:00–19:00 · Sat 09:00–19:00 · Sun 09:00–17:00', rating: '★★★★★', emoji: '☕', lat: 52.3643067, lng: 4.8745352 },
  { name: 'IZAKAYA Asian Kitchen & Bar', address: 'Albert Cuypstraat 2-6 De Pijp Amsterdam Netherlands', hours: 'Mon–Thu 12:00–01:00 · Fri–Sat 12:00–02:00 · Sun 12:00–01:00', rating: '★★★★★', emoji: '🍣' },
  { name: 'Mondi Amsterdam Nieuw-West', address: 'Transformatorweg 38, Amsterdam', hours: 'Lunch 12:30–16:00 · Dinner 17:30–22:00 · Bar until midnight', rating: '★★★★★', emoji: '🍽️' },
  { name: 'Maijard Smashburgers', address: 'Berenstraat 20, Amsterdam', hours: 'Daily 10:00–19:00', rating: '★★★★½', emoji: '🍔' },
  { name: 'BISOUS Amsterdam', address: 'Albert Cuypstraat 31, Amsterdam', hours: 'Mon–Thu 17:30–01:00 · Fri–Sat 16:00–02:00 · Sun Closed', rating: '★★★★☆', emoji: '🍗' },
  { name: 'Fort Negen Sandwich Bar', address: 'Jan Evertsenstraat 37, Amsterdam', hours: 'Wed–Fri 08:00–15:00 · Sat–Sun 08:00–16:00 · Mon–Tue Closed', rating: '★★★☆☆', emoji: '🥪' },
  { name: 'Leauf Amsterdam', address: 'Tweede Goudsbloemdwarsstraat 26, Amsterdam', hours: 'Mon–Fri 10:30–16:00 · Sat–Sun 10:30–17:00', rating: '★★★★★', emoji: '🥗' },
  { name: 'et CLAIRE', address: 'Beethovenstraat 38, Amsterdam', hours: 'Mon–Fri 08:00–18:00 · Sat–Sun 09:00–18:00', rating: '★★★☆☆', emoji: '🥐' },
  { name: 'Cafe Nobuya', address: 'Herenstraat 28, Amsterdam', hours: 'Check Google Maps for latest hours', rating: '★★★★★', emoji: '🍜' },
  { name: 'Brioche Amsterdam', address: 'Bilderdijkstraat 164, Amsterdam', hours: 'Wed–Fri 08:00–17:30 · Sat–Sun 09:00–17:00 · Mon–Tue Closed', rating: '★☆☆☆☆', emoji: '🧀' },
  { name: 'Le Smash Amsterdam', address: 'Govert Flinckstraat 122, Amsterdam', hours: 'Daily 12:00–22:00', rating: '★★★★½', emoji: '🍔' },
  { name: 'Fabel Friet', address: 'Runstraat 1, Amsterdam', hours: 'Daily 11:00–21:00', rating: '★★★★★', emoji: '🍟' },
  { name: 'Sjefietshé', address: 'Van Ostadestraat 1, Amsterdam', hours: 'Tue–Thu 17:30–01:00 · Fri–Sun 17:00–01:00 · Mon Closed', rating: '★★★★☆', emoji: '🐙' },
  { name: 'Bonnie Amsterdam', address: 'Amstelveenseweg 226, Amsterdam', hours: 'Mon–Wed 10:00–00:00 · Thu 10:00–01:00 · Fri–Sat 10:00–03:00 · Sun 10:00–00:00', rating: '★★★★☆', emoji: '🫔' },
  { name: 'Banh Mi Deli Amsterdam', address: 'Prinsengracht 172, Amsterdam', hours: 'Check Google Maps for latest hours', rating: '★★★★☆', emoji: '🥪' },
  { name: 'Chun Cafe Amsterdam', address: 'Berenstraat 8, Amsterdam', hours: 'Daily 10:00–17:00', rating: '★★★★★', emoji: '☕' },
  { name: 'Zorlu Center', address: 'Zorlu Center, Istanbul, Turkey', hours: 'Istanbul, Turkey', rating: '★★★★☆', emoji: '🥩' },
  { name: '360 Istanbul', address: '360 Istanbul restaurant Beyoglu', hours: 'Istanbul, Turkey · Live Music Saturdays', rating: '★★★★☆', emoji: '🥩' },
];

const map = L.map('map').setView([52.3676, 4.8897], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors'
}).addTo(map);

const markers = [];
let loaded = 0;



function loadAllSpots() {
  // Hardcoded precise coordinates from exact postcodes
  const coords = {
    'IZAKAYA Asian Kitchen & Bar':    [52.3544444, 4.8872222],
    'Mondi Amsterdam Nieuw-West':     [52.3465433, 4.8312512],
    'Maijard Smashburgers':           [52.3704724, 4.8835143],
    'BISOUS Amsterdam':               [52.3547351, 4.8878091],
    'Fort Negen Sandwich Bar':        [52.3710960, 4.8575170],
    'Leauf Amsterdam':                [52.3804253, 4.8840947],
    'et CLAIRE':                      [52.3493178, 4.8772145],
    'Cafe Nobuya':                    [52.3773429, 4.8886939],
    'Brioche Amsterdam':              [52.3673541, 4.871753],
    'Le Smash Amsterdam':             [52.3545069, 4.8908168],
    'Fabel Friet':                    [52.3688273, 4.8840617],
    'Sjefietshé':                     [52.3516313, 4.8870853],
    'Bonnie Amsterdam':               [52.3508957, 4.8565299],
    'Banh Mi Deli Amsterdam':         [52.3745504, 4.8827738],
    'Chun Cafe Amsterdam':            [52.3704688, 4.8839422],
    'The Coffee':                     [52.3643067, 4.8745352],
    'Zorlu Center':                   [41.06950, 29.01080],
    '360 Istanbul':                   [41.03360, 28.97740],
  };

  spots.forEach(s => {
    const c = coords[s.name];
    if (!c) return;
    s.lat = c[0];
    s.lng = c[1];
    const icon = L.divIcon({
      className: '',
      html: `<div style="background:#D4521A;color:#fff;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:17px;box-shadow:0 3px 10px rgba(0,0,0,0.35);border:2px solid #fff;">${s.emoji}</div>`,
      iconSize: [36,36], iconAnchor: [18,18], popupAnchor: [0,-22]
    });
    const marker = L.marker([s.lat, s.lng], {icon}).addTo(map);
    marker.bindPopup(`<b style="font-size:13px;">${s.name}</b><br><span style="font-size:11px;color:#8A7A66;">📍 ${s.address}</span><br><span style="font-size:11px;color:#2D5A3D;">🕐 ${s.hours}</span><br><span style="font-size:12px;color:#C8901A;">${s.rating}</span>`);
    markers.push({ spot: s, marker });
  });

  document.getElementById('loadingBar').style.display = 'none';
  buildList(spots);
}

function buildList(filtered) {
  const list = document.getElementById('spotsList');
  document.getElementById('spotsCount').textContent = filtered.length + ' spots';
  list.innerHTML = '';
  filtered.forEach(s => {
    const div = document.createElement('div');
    div.className = 'spot-item';
    div.innerHTML = `
      <span class="spot-emoji">${s.emoji}</span>
      <div class="spot-info">
        <p class="spot-name">${s.name}</p>
        <p class="spot-address">📍 ${s.address}</p>
        <p class="spot-hours">🕐 ${s.hours}</p>
      </div>
      <span class="spot-rating">${s.rating}</span>`;
    div.onclick = () => {
      document.querySelectorAll('.spot-item').forEach(x => x.classList.remove('active'));
      div.classList.add('active');
      if (s.lat && s.lng) {
        map.flyTo([s.lat, s.lng], 17, { duration: 1.2 });
        const m = markers.find(m => m.spot.name === s.name);
        if (m) m.marker.openPopup();
      }
    };
    list.appendChild(div);
  });
}

function filterSpots(val) {
  const v = val.toLowerCase();
  buildList(spots.filter(s => s.name.toLowerCase().includes(v) || s.address.toLowerCase().includes(v)));
}

// Load spots
loadAllSpots();
</script>
</body>
</html>
