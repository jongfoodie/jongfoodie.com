<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Map — Jong Foodie</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cream: #FAF7F2; --warm-white: #FFFDF9; --ink: #1A1208; --ink-soft: #3D2F1A;
    --muted: #8A7A66; --border: rgba(26,18,8,0.1); --accent: #D4521A;
    --accent-pale: #FBF3EF; --gold: #C8901A; --tag-bg: #F0EBE3;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--ink); font-size: 15px; line-height: 1.7; }
  nav { position: sticky; top: 0; z-index: 1000; background: var(--warm-white); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; }
  .nav-logo { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; color: var(--ink); text-decoration: none; }
  .nav-logo span { color: var(--accent); }
  .nav-links { display: flex; align-items: center; gap: 2rem; list-style: none; }
  .nav-links a { text-decoration: none; color: var(--ink-soft); font-size: 13px; font-weight: 500; letter-spacing: 0.03em; text-transform: uppercase; transition: color 0.2s; }
  .nav-links a:hover, .nav-links a.active { color: var(--accent); }
  .page-hero { background: var(--ink); color: #fff; padding: 2rem 2rem; text-align: center; }
  .page-hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(1.8rem, 4vw, 3rem); margin-bottom: 0.25rem; }
  .page-hero p { color: rgba(255,255,255,0.6); font-size: 14px; }
  .map-layout { display: grid; grid-template-columns: 320px 1fr; height: calc(100vh - 140px); }
  .spots-panel { background: var(--warm-white); border-right: 1px solid var(--border); overflow-y: auto; }
  .spots-search { padding: 1rem; border-bottom: 1px solid var(--border); }
  .search-input { width: 100%; border: 1px solid var(--border); border-radius: 20px; padding: 8px 16px; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--ink); background: var(--cream); outline: none; }
  .search-input:focus { border-color: var(--accent); }
  .spots-count { font-size: 11px; color: var(--muted); padding: 0.5rem 1rem; border-bottom: 1px solid var(--border); }
  .spots-list { padding: 0.5rem; }
  .spot-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem 0.75rem; border-radius: 10px; cursor: pointer; transition: background 0.15s; border-bottom: 1px solid var(--border); }
  .spot-item:last-child { border-bottom: none; }
  .spot-item:hover, .spot-item.active { background: var(--accent-pale); }
  .spot-emoji { font-size: 24px; line-height: 1; min-width: 32px; text-align: center; }
  .spot-info { flex: 1; }
  .spot-name { font-weight: 500; font-size: 13px; line-height: 1.3; }
  .spot-meta { font-size: 11px; color: var(--muted); }
  .spot-rating { font-size: 11px; color: var(--gold); font-weight: 500; white-space: nowrap; }
  #map { height: 100%; width: 100%; z-index: 0; }
  .leaflet-popup-content-wrapper { border-radius: 12px; font-family: 'DM Sans', sans-serif; box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
  .popup-title { font-family: 'Playfair Display', serif; font-size: 15px; margin-bottom: 3px; font-weight: 700; }
  .popup-meta { font-size: 11px; color: #8A7A66; margin-bottom: 3px; }
  .popup-rating { color: #C8901A; font-size: 12px; font-weight: 500; }
  @media (max-width: 700px) {
    .map-layout { grid-template-columns: 1fr; grid-template-rows: 280px 1fr; }
    #map { height: 280px; }
    nav { padding: 0 1rem; }
    .nav-links { display: none; }
  }
</style>
</head>
<body>
<nav>
  <a class="nav-logo" href="index.html">Jong <span>Foodie</span></a>
  <ul class="nav-links">
    <li><a href="reviews.html">Reviews</a></li>
    <li><a href="guides.html">Guides</a></li>
    <li><a href="map.html" class="active">Map</a></li>
    <li><a href="community.html">Community</a></li>
  </ul>
</nav>
<div class="page-hero">
  <h1>Food Map</h1>
  <p>All Jong Foodie reviewed spots — Amsterdam &amp; beyond</p>
</div>
<div class="map-layout">
  <div class="spots-panel">
    <div class="spots-search">
      <input class="search-input" type="text" placeholder="Search spots…" oninput="filterSpots(this.value)">
    </div>
    <div class="spots-count" id="spotsCount">20 spots</div>
    <div class="spots-list" id="spotsList"></div>
  </div>
  <div id="map"></div>
</div>
<script>
  const spots = [
    { name: 'Izakaya Amsterdam', meta: 'Amsterdam · Sushi / Japanese · Luxury', rating: '★★★★★ 5.0', emoji: '🍣', lat: 52.3680, lng: 4.8951 },
    { name: 'Mondi Amsterdam Nieuw-West', meta: 'Amsterdam, New West · Restaurant · €74', rating: '★★★★★ 5.0', emoji: '🍽️', lat: 52.3738, lng: 4.8374 },
    { name: 'Maijard — Chicken Smash (2024)', meta: 'Amsterdam · Burgers · €15', rating: '★★★★★ 5.0', emoji: '🍔', lat: 52.3602, lng: 4.8893 },
    { name: 'Bisous Amsterdam', meta: 'Amsterdam · Restaurant · €28', rating: '★★★★☆ 4.0', emoji: '🍗', lat: 52.3667, lng: 4.9123 },
    { name: 'Fort Negen Sandwich Bar', meta: 'Amsterdam · Sandwiches · €15', rating: '★★★☆☆ 3.0', emoji: '🥪', lat: 52.3721, lng: 4.8956 },
    { name: 'Leauf Amsterdam', meta: 'Amsterdam · Sandwiches · €15', rating: '★★★★★ 5.0', emoji: '🥗', lat: 52.3745, lng: 4.9012 },
    { name: 'Maijard — Chicken Smashed (2024)', meta: 'Amsterdam · Burgers · €16', rating: '★★★★☆ 4.0', emoji: '🍗', lat: 52.3598, lng: 4.8901 },
    { name: 'et CLAIRE', meta: 'Amsterdam · Pastries · €9.65', rating: '★★★☆☆ 3.0', emoji: '🥐', lat: 52.3759, lng: 4.8834 },
    { name: 'Cafe Nobuya', meta: 'Amsterdam · Japanese Fusion · €11.30', rating: '★★★★★ 5.0', emoji: '🍜', lat: 52.3702, lng: 4.8952 },
    { name: 'Brioche Amsterdam', meta: 'Amsterdam · Cafe · €6.50', rating: '★☆☆☆☆ 1.0', emoji: '🧀', lat: 52.3712, lng: 4.8978 },
    { name: 'Le Smash', meta: 'Amsterdam · Burgers · €12.95', rating: '★★★★½ 4.8', emoji: '🍔', lat: 52.3689, lng: 4.9034 },
    { name: 'Fabel Friet', meta: 'Netherlands · Fries · €5.50', rating: '★★★★★ 5.0', emoji: '🍟', lat: 52.3756, lng: 4.9001 },
    { name: 'Sjefietshé', meta: 'Netherlands · Seafood · €19', rating: '★★★★☆ 4.0', emoji: '🐙', lat: 52.3644, lng: 4.8812 },
    { name: 'Bonnie — Kimchi Croque', meta: 'Amsterdam · Cafe · €12.95', rating: '★★★★☆ 4.0', emoji: '🫔', lat: 52.3731, lng: 4.8867 },
    { name: 'Banh Mi Deli Amsterdam', meta: 'Amsterdam · Sandwiches · €9.75', rating: '★★★★☆ 4.0', emoji: '🥪', lat: 52.3695, lng: 4.8923 },
    { name: 'Maijard Smashburgers — Original', meta: 'Netherlands · Burgers · €14', rating: '★★★★½ 4.5', emoji: '🍔', lat: 52.3605, lng: 4.8880 },
    { name: 'Bonnie — Steak Sandwich', meta: 'Amsterdam · Sandwiches · €11.95', rating: '★★★★☆ 4.0', emoji: '🥩', lat: 52.3728, lng: 4.8871 },
    { name: 'Chun Cafe Amsterdam', meta: 'Amsterdam · Cafe · €10', rating: '★★★★★ 5.0', emoji: '🥓', lat: 52.3718, lng: 4.9045 },
    { name: 'Zorlu Center', meta: 'Turkey · Steak', rating: '★★★★☆ 4.0', emoji: '🥩', lat: 41.0695, lng: 29.0108 },
    { name: '360 Istanbul', meta: 'Istanbul, Turkey · Steak · €30', rating: '★★★★☆ 4.0', emoji: '🥩', lat: 41.0336, lng: 28.9774 },
  ];

  const map = L.map('map').setView([52.3676, 4.9041], 13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors'
  }).addTo(map);

  const markers = [];

  spots.forEach((s, i) => {
    const icon = L.divIcon({
      className: '',
      html: `<div style="background:#D4521A;color:#fff;border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 2px 8px rgba(0,0,0,0.3);border:2px solid #fff;">${s.emoji}</div>`,
      iconSize: [34, 34], iconAnchor: [17, 17], popupAnchor: [0, -20]
    });
    const marker = L.marker([s.lat, s.lng], { icon })
      .addTo(map)
      .bindPopup(`<div class="popup-title">${s.name}</div><div class="popup-meta">${s.meta}</div><div class="popup-rating">${s.rating}</div>`);
    markers.push(marker);
  });

  function buildList(filtered) {
    const list = document.getElementById('spotsList');
    const count = document.getElementById('spotsCount');
    list.innerHTML = '';
    count.textContent = filtered.length + ' spots';
    filtered.forEach((s, i) => {
      const div = document.createElement('div');
      div.className = 'spot-item' + (i === 0 ? ' active' : '');
      div.innerHTML = `<span class="spot-emoji">${s.emoji}</span><div class="spot-info"><p class="spot-name">${s.name}</p><p class="spot-meta">${s.meta}</p></div><span class="spot-rating">${s.rating.split(' ')[0]}</span>`;
      div.onclick = () => {
        document.querySelectorAll('.spot-item').forEach(x => x.classList.remove('active'));
        div.classList.add('active');
        map.flyTo([s.lat, s.lng], 15, { duration: 1 });
      };
      list.appendChild(div);
    });
  }

  buildList(spots);

  function filterSpots(val) {
    const filtered = spots.filter(s => s.name.toLowerCase().includes(val.toLowerCase()) || s.meta.toLowerCase().includes(val.toLowerCase()));
    buildList(filtered);
  }
</script>
</body>
</html>
