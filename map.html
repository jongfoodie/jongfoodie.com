<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Map — Jong Foodie</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cream: #FAF7F2; --warm-white: #FFFDF9; --ink: #1A1208; --ink-soft: #3D2F1A;
    --muted: #8A7A66; --border: rgba(26,18,8,0.1); --accent: #D4521A;
    --accent-pale: #FBF3EF; --gold: #C8901A; --tag-bg: #F0EBE3;
    --green: #2D5A3D; --green-light: #E8F2EC;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--ink); font-size: 15px; line-height: 1.7; }
  nav { position: sticky; top: 0; z-index: 1000; background: var(--warm-white); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; }
  .nav-logo { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; color: var(--ink); text-decoration: none; }
  .nav-logo span { color: var(--accent); }
  .nav-links { display: flex; align-items: center; gap: 2rem; list-style: none; }
  .nav-links a { text-decoration: none; color: var(--ink-soft); font-size: 13px; font-weight: 500; letter-spacing: 0.03em; text-transform: uppercase; transition: color 0.2s; }
  .nav-links a:hover, .nav-links a.active { color: var(--accent); }
  .page-hero { background: var(--ink); color: #fff; padding: 2rem 2rem; text-align: center; }
  .page-hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(1.8rem, 4vw, 3rem); margin-bottom: 0.25rem; }
  .page-hero p { color: rgba(255,255,255,0.6); font-size: 14px; }
  .map-layout { display: grid; grid-template-columns: 320px 1fr; height: calc(100vh - 140px); }
  .spots-panel { background: var(--warm-white); border-right: 1px solid var(--border); overflow-y: auto; }
  .spots-search { padding: 1rem; border-bottom: 1px solid var(--border); }
  .search-input { width: 100%; border: 1px solid var(--border); border-radius: 20px; padding: 8px 16px; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--ink); background: var(--cream); outline: none; }
  .search-input:focus { border-color: var(--accent); }
  .spots-count { font-size: 11px; color: var(--muted); padding: 0.5rem 1rem; border-bottom: 1px solid var(--border); }
  .spots-list { padding: 0.5rem; }
  .spot-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem 0.75rem; border-radius: 10px; cursor: pointer; transition: background 0.15s; border-bottom: 1px solid var(--border); }
  .spot-item:last-child { border-bottom: none; }
  .spot-item:hover, .spot-item.active { background: var(--accent-pale); }
  .spot-emoji { font-size: 24px; line-height: 1; min-width: 32px; text-align: center; }
  .spot-info { flex: 1; }
  .spot-name { font-weight: 500; font-size: 13px; line-height: 1.3; }
  .spot-meta { font-size: 11px; color: var(--muted); }
  .spot-hours { font-size: 10px; color: var(--green); font-weight: 500; }
  .spot-rating { font-size: 11px; color: var(--gold); font-weight: 500; white-space: nowrap; }
  #map { height: 100%; width: 100%; z-index: 0; }
  .leaflet-popup-content-wrapper { border-radius: 12px; font-family: 'DM Sans', sans-serif; box-shadow: 0 4px 20px rgba(0,0,0,0.15); max-width: 220px; }
  .popup-title { font-family: 'Playfair Display', serif; font-size: 14px; margin-bottom: 3px; font-weight: 700; }
  .popup-meta { font-size: 11px; color: #8A7A66; margin-bottom: 2px; }
  .popup-hours { font-size: 11px; color: #2D5A3D; font-weight: 500; margin-bottom: 2px; }
  .popup-rating { color: #C8901A; font-size: 12px; font-weight: 500; }
  @media (max-width: 700px) {
    .map-layout { grid-template-columns: 1fr; grid-template-rows: 280px 1fr; }
    #map { height: 280px; }
    nav { padding: 0 1rem; }
    .nav-links { display: none; }
  }
</style>
</head>
<body>
<nav>
  <a class="nav-logo" href="index.html">Jong <span>Foodie</span></a>
  <ul class="nav-links">
    <li><a href="reviews.html">Reviews</a></li>
    <li><a href="guides.html">Guides</a></li>
    <li><a href="map.html" class="active">Map</a></li>
    <li><a href="community.html">Community</a></li>
  </ul>
</nav>
<div class="page-hero">
  <h1>Food Map</h1>
  <p>All Jong Foodie reviewed spots — Amsterdam & beyond</p>
</div>
<div class="map-layout">
  <div class="spots-panel">
    <div class="spots-search">
      <input class="search-input" type="text" placeholder="Search spots…" oninput="filterSpots(this.value)">
    </div>
    <div class="spots-count" id="spotsCount">20 spots</div>
    <div class="spots-list" id="spotsList"></div>
  </div>
  <div id="map"></div>
</div>
<script>
  const spots = [
    { name: 'IZAKAYA Asian Kitchen & Bar', address: 'Albert Cuypstraat 2-6, Amsterdam', meta: 'Sushi / Japanese · Luxury', hours: 'Mon–Thu 12:00–01:00 · Fri–Sat 12:00–02:00 · Sun 12:00–01:00', rating: '★★★★★ 5.0', emoji: '🍣', lat: 52.3553, lng: 4.9011 },
    { name: 'Mondi Amsterdam Nieuw-West', address: 'Amsterdam, New West', meta: 'Restaurant · €74', hours: 'Lunch 12:30–16:00 · Dinner 17:30–22:00 · Bar until midnight', rating: '★★★★★ 5.0', emoji: '🍽️', lat: 52.3738, lng: 4.8374 },
    { name: 'Maijard Smashburgers', address: 'Berenstraat 20HS, Amsterdam', meta: 'Burgers · €14–16', hours: 'Daily 10:00–19:00', rating: '★★★★½ 4.5', emoji: '🍔', lat: 52.3660, lng: 4.8849 },
    { name: 'BISOUS Amsterdam', address: 'Albert Cuypstraat 31, Amsterdam', meta: 'French Restaurant · €28', hours: 'Mon–Thu 17:30–01:00 · Fri 16:00–02:00 · Sat 16:00–02:00 · Sun Closed', rating: '★★★★☆ 4.0', emoji: '🍗', lat: 52.3554, lng: 4.9010 },
    { name: 'Fort Negen Sandwich Bar', address: 'Jan Evertsenstraat 37h, Amsterdam', meta: 'Sandwiches · €15', hours: 'Wed–Fri 08:00–15:00 · Sat–Sun 08:00–16:00 · Mon–Tue Closed', rating: '★★★☆☆ 3.0', emoji: '🥪', lat: 52.3721, lng: 4.8641 },
    { name: 'Leauf Amsterdam', address: 'Tweede Goudsbloemdwarsstraat 26, Amsterdam', meta: 'Sandwiches · €15', hours: 'Mon–Fri 10:30–16:00 · Sat–Sun 10:30–17:00', rating: '★★★★★ 5.0', emoji: '🥗', lat: 52.3783, lng: 4.8821 },
    { name: 'et CLAIRE', address: 'Beethovenstraat 38, Amsterdam', meta: 'Pastries · €9.65', hours: 'Mon–Fri 08:00–18:00 · Sat–Sun 09:00–18:00', rating: '★★★☆☆ 3.0', emoji: '🥐', lat: 52.3448, lng: 4.8762 },
    { name: 'Cafe Nobuya', address: 'Herenstraat 28D, Amsterdam', meta: 'Japanese Fusion · €11.30', hours: 'Check Google Maps for latest hours', rating: '★★★★★ 5.0', emoji: '🍜', lat: 52.3773, lng: 4.8861 },
    { name: 'Brioche Amsterdam', address: 'Bilderdijkstraat 164H, Amsterdam', meta: 'Cafe · €6.50', hours: 'Wed–Fri 08:00–17:30 · Sat–Sun 09:00–17:00 · Mon–Tue Closed', rating: '★☆☆☆☆ 1.0', emoji: '🧀', lat: 52.3689, lng: 4.8680 },
    { name: 'Le Smash Amsterdam', address: 'Govert Flinckstraat 122-h, Amsterdam', meta: 'Burgers · €12.95', hours: 'Daily 12:00–22:00', rating: '★★★★½ 4.8', emoji: '🍔', lat: 52.3518, lng: 4.9007 },
    { name: 'Fabel Friet', address: 'Runstraat 1, Amsterdam', meta: 'Fries · €5.50', hours: 'Daily 11:00–21:00', rating: '★★★★★ 5.0', emoji: '🍟', lat: 52.3678, lng: 4.8816 },
    { name: 'Sjefietshé', address: 'Van Ostadestraat 1, Amsterdam', meta: 'Seafood · €19', hours: 'Tue–Thu 17:30–01:00 · Fri–Sat 17:00–01:00 · Sun 17:00–01:00 · Mon Closed', rating: '★★★★☆ 4.0', emoji: '🐙', lat: 52.3516, lng: 4.8983 },
    { name: 'Bonnie — Kimchi Croque & Steak Sandwich', address: 'Amstelveenseweg 226h, Amsterdam', meta: 'Cafe · €11.95–12.95', hours: 'Mon–Wed 10:00–00:00 · Thu 10:00–01:00 · Fri 10:00–03:00 · Sat 10:00–03:00 · Sun 10:00–00:00', rating: '★★★★☆ 4.0', emoji: '🫔', lat: 52.3453, lng: 4.8662 },
    { name: 'Banh Mi Deli Amsterdam', address: 'Prinsengracht 172HS, Amsterdam', meta: 'Vietnamese Sandwiches · €9.75', hours: 'Check Google Maps for latest hours', rating: '★★★★☆ 4.0', emoji: '🥪', lat: 52.3738, lng: 4.8838 },
    { name: 'Chun Cafe Amsterdam', address: 'Berenstraat 8, Amsterdam', meta: 'Cafe · €10', hours: 'Daily 10:00–17:00', rating: '★★★★★ 5.0', emoji: '🥓', lat: 52.3661, lng: 4.8852 },
    { name: 'Zorlu Center', address: 'Istanbul, Turkey', meta: 'Steak', hours: 'Istanbul, Turkey', rating: '★★★★☆ 4.0', emoji: '🥩', lat: 41.0695, lng: 29.0108 },
    { name: '360 Istanbul', address: 'Istanbul, Turkey', meta: 'Steak · €30', hours: 'Istanbul, Turkey', rating: '★★★★☆ 4.0', emoji: '🥩', lat: 41.0336, lng: 28.9774 },
  ];

  const map = L.map('map').setView([52.3676, 4.9041], 13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors'
  }).addTo(map);

  spots.forEach((s, i) => {
    const icon = L.divIcon({
      className: '',
      html: `<div style="background:#D4521A;color:#fff;border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 2px 8px rgba(0,0,0,0.3);border:2px solid #fff;">${s.emoji}</div>`,
      iconSize: [34, 34], iconAnchor: [17, 17], popupAnchor: [0, -20]
    });
    L.marker([s.lat, s.lng], { icon })
      .addTo(map)
      .bindPopup(`<div class="popup-title">${s.name}</div><div class="popup-meta">📍 ${s.address}</div><div class="popup-hours">🕐 ${s.hours}</div><div class="popup-rating">${s.rating}</div>`);
  });

  function buildList(filtered) {
    const list = document.getElementById('spotsList');
    const count = document.getElementById('spotsCount');
    list.innerHTML = '';
    count.textContent = filtered.length + ' spots';
    filtered.forEach((s, i) => {
      const div = document.createElement('div');
      div.className = 'spot-item' + (i === 0 ? ' active' : '');
      div.innerHTML = `<span class="spot-emoji">${s.emoji}</span><div class="spot-info"><p class="spot-name">${s.name}</p><p class="spot-meta">${s.meta}</p><p class="spot-hours">🕐 ${s.hours}</p></div><span class="spot-rating">${s.rating.split(' ')[0]}</span>`;
      div.onclick = () => {
        document.querySelectorAll('.spot-item').forEach(x => x.classList.remove('active'));
        div.classList.add('active');
        map.flyTo([s.lat, s.lng], 16, { duration: 1 });
      };
      list.appendChild(div);
    });
  }

  buildList(spots);

  function filterSpots(val) {
    const filtered = spots.filter(s => s.name.toLowerCase().includes(val.toLowerCase()) || s.meta.toLowerCase().includes(val.toLowerCase()));
    buildList(filtered);
  }
</script>
</body>
</html>
